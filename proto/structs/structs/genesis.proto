syntax = "proto3";


package structs.structs;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "structs/structs/params.proto";

import "structs/structs/address.proto";
import "structs/structs/agreement.proto";
import "structs/structs/allocation.proto";
import "structs/structs/fleet.proto";
import "structs/structs/grid.proto";
import "structs/structs/guild.proto";
import "structs/structs/infusion.proto";
import "structs/structs/keys.proto";
import "structs/structs/permission.proto";
import "structs/structs/player.proto";
import "structs/structs/planet.proto";
import "structs/structs/provider.proto";
import "structs/structs/reactor.proto";
import "structs/structs/struct.proto";
import "structs/structs/substation.proto";

option go_package = "structs/x/structs/types";

// GenesisState defines the structs module's genesis state.
message GenesisState {
  
  // params defines all the parameters of the module.
  Params params  = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  string port_id = 2;

  repeated  Allocation allocationList   = 3 [(gogoproto.nullable) = false];
            uint64     allocationCount  = 28;

  repeated  Agreement   agreementList    = 4 [(gogoproto.nullable) = false];

  repeated  Infusion    infusionList     = 5 [(gogoproto.nullable) = false];
  repeated  string      infusionDestructionQueue = 29;

  repeated  Guild       guildList        = 6 [(gogoproto.nullable) = false];
            uint64      guildCount       = 7;
  repeated  GuildMembershipApplication guildMembershipApplicationList = 33 [(gogoproto.nullable) = false];


  repeated  Planet                planetList            = 8 [(gogoproto.nullable) = false];
            uint64                planetCount           = 9;
  repeated  PlanetAttributeRecord planetAttributeList   = 24;

  repeated  Player     playerList       = 10 [(gogoproto.nullable) = false];
            uint64     playerCount      = 11;


  repeated  Provider                  providerList            = 12 [(gogoproto.nullable) = false];
            uint64                    providerCount           = 13;
  repeated  ProviderGuildAccessRecord providerGuildAccessList = 27;

  repeated  Reactor    reactorList      =  14 [(gogoproto.nullable) = false];
            uint64     reactorCount     =  15;

  repeated  Struct                        structList          = 16 [(gogoproto.nullable) = false];
            uint64                        structCount         = 17;
  repeated  StructAttributeRecord         structAttributeList = 25;
  repeated  StructDefender                structDefenderList  = 26;
  repeated  StructDestructionQueueRecord  structDestructionQueue = 31;

  repeated  Substation substationList   =  18 [(gogoproto.nullable) = false];
            uint64     substationCount  =  19;

  repeated  PermissionRecord           permissionList         = 20;
  repeated  GuildRankPermissionRecord  guildRankPermissionList = 34;
  repeated  GridRecord                 gridList               = 21;
  repeated  string              gridCascadeQueue = 30;

  repeated  AddressRecord       addressList     = 22;

  repeated  Fleet               fleetList       = 23 [(gogoproto.nullable) = false];


}
